*{margin:0;padding:0;box-sizing:border-box;}

html{
background:#c7c7c3;

body{
background:#c7c7c3;

color:#242921;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:20px;
}

.container{max-width:500px;width:100%;}

h1{font-size:2.75rem;margin-bottom:.5rem;font-weight:700;}

.subtitle{font-size:.99rem;margin-bottom:1rem;opacity:.7;}

.filter-tabs{
display:flex;

margin-bottom:2rem;
font-size:1.155rem;
}

.filter-tab{
cursor:pointer;
opacity:.5;
transition:opacity .3s;
}

.filter-tab:hover{opacity:.7;}

.filter-tab.active{
opacity:1;
}

.quest-list{margin-bottom:2rem;}

.quest-item{
display:flex;
align-items:center;
gap:.75rem;
margin-bottom:1.5rem;

justify-content:flex-end;
}

.quest-content{
flex:1;

align-items:center;
gap:.5rem;
}

.quest-text{
flex:1;
line-height:1.5;
}

input[type="checkbox"]{
appearance:none;
-webkit-appearance:none;
width:20px;
height:20px;
border:2px solid #242921;
border-radius:50%;
cursor:pointer;
flex-shrink:0;
transition:all .2s ease;
}

input[type="checkbox"]:checked{background:#242921;}

.quest-text.completed{
text-decoration:line-through;
opacity:.5;
}

.difficulty-badge{
font-size:.825rem;
padding:.2rem .5rem;
border-radius:3px;
white-space:nowrap;
flex-shrink:0;
display:flex;
align-items:center;
justify-content:center;
}

.difficulty-easy{background:rgba(36,41,33,.1);color:#242921;}
.difficulty-medium{background:rgba(36,41,33,.2);color:#242921;}
.difficulty-hard{background:rgba(36,41,33,.35);color:#242921;}

button{
background:#242921;
color:#c7c7c3;
border:none;
padding:.75rem 1.5rem;
font-family:'Hina Mincho',serif;
font-size:1.1rem;
font-weight:700;
border-radius:4px;
cursor:pointer;
transition:opacity .2s;
}

button:hover{opacity:.85;}
button:active{opacity:.7;}

.button-container{display:flex;gap:.75rem;align-items:center;}

.theme-toggle{
width:53px;
height:53px;
padding:.75rem;
display:flex;
align-items:center;
justify-content:center;
}

body.dark-mode{background:#242921 !important;color:#c7c7c3;}
body.dark-mode button,body.dark-mode .theme-toggle{background:#c7c7c3;color:#242921;}
body.dark-mode input[type="checkbox"]{border-color:#c7c7c3;}
body.dark-mode input[type="checkbox"]:checked{background:#c7c7c3;}
body.dark-mode .difficulty-easy{background:rgba(199,199,195,.15);color:#c7c7c3;}
body.dark-mode .difficulty-medium{background:rgba(199,199,195,.25);color:#c7c7c3;}
body.dark-mode .difficulty-hard{background:rgba(199,199,195,.4);color:#c7c7c3;}

let quests=[];
let states=[false,false,false,false,false,false];

function pickRandom(arr){
return arr[Math.floor(Math.random()*arr.length)];
}

function filterByLocation(arr, filter){
if(filter === 'all') return arr;
return arr.filter(q => q.loc === filter || q.loc === 'both');
}

function getRandomQuests(){
const filter = currentFilter;

const easyFiltered = filterByLocation(allQuests.easy, filter);
const mediumFiltered = filterByLocation(allQuests.medium, filter);
const hardFiltered = filterByLocation(allQuests.hard, filter);

return[
{text:pickRandom(easyFiltered).text,difficulty:"easy"},
{text:pickRandom(easyFiltered).text,difficulty:"easy"},
{text:pickRandom(easyFiltered).text,difficulty:"easy"},
{text:pickRandom(mediumFiltered).text,difficulty:"medium"},
{text:pickRandom(mediumFiltered).text,difficulty:"medium"},
{text:pickRandom(hardFiltered).text,difficulty:"hard"}
];
}

function setFilter(filter){
currentFilter = filter;

// update tab active states
document.querySelectorAll('.filter-tab').forEach(tab => {
tab.classList.remove('active');
});
document.getElementById('tab-' + filter).classList.add('active');

// reshuffle with new filter
shuffleQuests();
}

function save(){
localStorage.setItem(STORAGE,JSON.stringify({
quests,
states,
theme:document.body.classList.contains("dark-mode"),
filter:currentFilter,
date:new Date().toDateString()
}));
}

function load(){
let data=localStorage.getItem(STORAGE);
if(!data)return false;

data=JSON.parse(data);

if(data.date!==new Date().toDateString())return false;

quests=data.quests;
states=data.states;
currentFilter=data.filter || 'all';

// restore filter tab active state
document.querySelectorAll('.filter-tab').forEach(tab => {
tab.classList.remove('active');
});
document.getElementById('tab-' + currentFilter).classList.add('active');

if(data.theme){
document.body.classList.add("dark-mode");
document.documentElement.style.backgroundColor='#242921';
}

return true;
}

const title=document.getElementById("title");

const done=states.filter(v=>v).length;

if(done===6){
title.textContent="all finished!";
}else{
title.textContent="sidequest";
}

list.innerHTML="";

quests.forEach((q,i)=>{

const item=document.createElement("div");
item.className="quest-item";

const box=document.createElement("input");
box.type="checkbox";
box.checked=states[i];
box.onchange=()=>toggle(i);

const content=document.createElement("div");
content.className="quest-content";

const text=document.createElement("span");
text.className="quest-text"+(states[i]?" completed":"");
text.textContent=q.text;

const badge=document.createElement("span");
badge.className="difficulty-badge difficulty-"+q.difficulty;
badge.textContent=q.difficulty;

content.appendChild(text);
content.appendChild(badge);
item.appendChild(box);
item.appendChild(content);

list.appendChild(item);

});
}

function toggle(i){
playClick();
states[i]=!states[i];

save();
render();

if(states.every(v=>v))celebrate();
}

function shuffleQuests(){
quests=getRandomQuests();
states=[false,false,false,false,false,false];

save();
render();
}

function toggleTheme(){
document.body.classList.toggle("dark-mode");
document.documentElement.style.backgroundColor = 
document.body.classList.contains('dark-mode') ? '#242921' : '#c7c7c3';
save();
}

function celebrate(){
const msg=document.createElement("div");

msg.innerText="quest complete ✧";

msg.style.cssText=`
position:fixed;
top:20px;
left:50%;
transform:translateX(-50%);
background:#242921;
color:#c7c7c3;
padding:10px 20px;
border-radius:6px;
font-family:'Hina Mincho',serif;
z-index:1000;
`;

if(document.body.classList.contains('dark-mode')){
msg.style.background='#c7c7c3';
msg.style.color='#242921';
}

document.body.appendChild(msg);

setTimeout(()=>msg.remove(),2000);
}

function init(){
if(!load()){
quests=getRandomQuests();
}

render();
}

init();

</script>

</body>
</html>
